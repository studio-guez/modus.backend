title: modus

options:
  preview: https://modus-ge.ch.ch/

tabs:
  # Content tab (existing structure)
  content:
    label: Contenu
    columns:
      - width: 1/3
        fields:
          files:
            label:
              fr: Fichiers
            type: files
            layout: small
            uploads:
              template: pdf

      - width: 2/3
        sections:
          tags:
            label: "Tags"
            type: pages
            status: listed
            image: false
            templates: tags
            layout: cards
            size: medium

          pages:
            image: false
            type: pages
            create: default
            templates:
              - home
              - default
              - default-admin
              - projects
              - outils-modus
              - library
              - medias
              - toolkit

  # Navigation tab (new)
  navigation:
    label: Navigation
    columns:
      - width: 1/2
        fields:
          topMenu:
            label: Menu haut
            type: structure
            fields:
              linkedPage:
                label: Page liée
                type: pages
                multiple: false
                query: site.children.listed
                when:
                  itemType: page
              externalUrl:
                label: URL externe
                type: url
                when:
                  itemType: external
              customTitle:
                label: Titre personnalisé
                type: text
              openInNewTab:
                label: Nouvel onglet
                type: toggle
                default: false

          mainMenu:
            label: Menu principal
            type: structure
            fields:
              linkedPage:
                label: Page liée
                type: pages
                multiple: false
                query: site.children.listed
                when:
                  itemType: page
              projectTypeFilter:
                label: Filtre type projet
                type: select
                default: ""
                options:
                  "": Aucun filtre
                  project-modus: Modus
                  project-supported: Soutenu
                whenTemplate:
                  linkedPage: projects
              externalUrl:
                label: URL externe
                type: url
                when:
                  itemType: external
              customTitle:
                label: Titre personnalisé
                type: text
              openInNewTab:
                label: Nouvel onglet
                type: toggle
                default: false
              children:
                label: Sous-éléments
                type: structure
                fields:
                  itemType:
                    label: Type
                    type: select
                    required: true
                    default: page
                    options:
                      page: Page interne
                      external: Lien externe
                  linkedPage:
                    label: Page liée
                    type: pages
                    multiple: false
                    query: site.children.listed
                    when:
                      itemType: page
                  projectTypeFilter:
                    label: Filtre type projet
                    type: select
                    default: ""
                    options:
                      "": Aucun
                      project-modus: Modus
                      project-supported: Soutenu
                    whenTemplate:
                      linkedPage: projects
                  statusFilter:
                    label: Filtre statut
                    type: select
                    default: ""
                    options:
                      "": Aucun
                      en-cours: En cours
                      termine: Terminé
                    whenTemplate:
                      linkedPage:
                        - projects
                        - tags
                  mediaTypeFilter:
                    label: Filtre type média
                    type: select
                    default: ""
                    options:
                      "": Aucun
                      video: Vidéo
                      podcast: Podcast
                    whenTemplate:
                      linkedPage: medias
                  externalUrl:
                    label: URL externe
                    type: url
                    when:
                      itemType: external
                  customTitle:
                    label: Titre personnalisé
                    type: text
                  svgIcon:
                    label: Icône SVG
                    type: files
                    query: site.files.filterBy('extension', 'svg')
                    multiple: false
                  openInNewTab:
                    label: Nouvel onglet
                    type: toggle
                    default: false

      - width: 1/2
        fields:
          bottomMenu:
            label: Menu bas
            type: structure
            fields:
              linkedPage:
                label: Page liée
                type: pages
                multiple: false
                query: site.children.listed
                when:
                  itemType: page
              projectTypeFilter:
                label: Filtre type projet
                type: select
                default: ""
                options:
                  "": Aucun filtre
                  project-modus: Modus
                  project-supported: Soutenu
                whenTemplate:
                  linkedPage: projects
              externalUrl:
                label: URL externe
                type: url
                when:
                  itemType: external
              customTitle:
                label: Titre personnalisé
                type: text
              openInNewTab:
                label: Nouvel onglet
                type: toggle
                default: false

          footerMenu:
            label: Menu footer
            type: structure
            fields:
              linkedPage:
                label: Page liée
                type: pages
                multiple: false
                query: site.children.listed
                when:
                  itemType: page
              projectTypeFilter:
                label: Filtre type projet
                type: select
                default: ""
                options:
                  "": Aucun filtre
                  project-modus: Modus
                  project-supported: Soutenu
                whenTemplate:
                  linkedPage: projects
              externalUrl:
                label: URL externe
                type: url
                when:
                  itemType: external
              customTitle:
                label: Titre personnalisé
                type: text
              openInNewTab:
                label: Nouvel onglet
                type: toggle
                default: false
